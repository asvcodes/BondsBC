<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bond Marketplace MVP</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>Decentralized Bond Marketplace (MVP)</h1>
    <button id="connectWalletBtn">Connect Wallet</button>
    <p id="walletStatus">Wallet: Not connected</p>
  </header>

  <main>
    <section class="card">
      <h2>Organization Panel</h2>
      <h3>Create Bond</h3>
      <form id="createBondForm">
        <input id="bondName" type="text" placeholder="Bond Name" required />
        <input id="interestRate" type="number" placeholder="Interest Rate (%)" min="0" required />
        <input id="durationDays" type="number" placeholder="Duration (days)" min="1" required />
        <input id="totalFundingEth" type="number" placeholder="Total Funding (ETH)" min="0.0001" step="0.0001" required />
        <button type="submit">Create Bond</button>
      </form>

      <h3>Update Fund Usage</h3>
      <form id="fundUsageForm">
        <input id="usageBondId" type="number" placeholder="Bond ID" min="0" required />
        <input id="usageDescription" type="text" placeholder="Usage description" required />
        <button type="submit">Update Usage</button>
      </form>
    </section>

    <section class="card">
      <h2>All Bonds</h2>
      <button id="refreshBondsBtn">Refresh Bonds</button>
      <div id="bondsContainer"></div>
    </section>

    <section class="card">
      <h2>Investor Panel</h2>
      <button id="loadPortfolioBtn">Load My Portfolio</button>
      <ul id="portfolioList"></ul>
    </section>

    <section class="card">
      <h2>Bond Details</h2>
      <form id="bondDetailsForm">
        <input id="detailsBondId" type="number" placeholder="Bond ID" min="0" required />
        <button type="submit">Get Bond Details</button>
      </form>
      <pre id="bondDetailsOutput">No bond selected.</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
